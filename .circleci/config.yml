version: 2.1

jobs:
  php82:
    docker:
      - image: cimg/php:7.4
    steps:
      - checkout
      - run: composer require phpunit/phpunit phpstan/phpstan --dev
      - run: php vendor/bin/phpunit
      - run: php vendor/bin/phpstan analyze

workflows:
  version: 2
  workflow:
    jobs:
      - php7.4
